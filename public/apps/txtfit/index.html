<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
  <title>TxtFit</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      background: #f2f4f8;
      color: #1a1a2e;
      height: 100dvh;
      display: flex;
      flex-direction: column;
      overflow: hidden;
    }

    /* ── AppBar ── */
    #appbar {
      background: #0078d4;
      color: #fff;
      text-align: center;
      padding: 14px 16px 0;
      flex-shrink: 0;
    }
    #appbar h1 {
      font-size: 20px;
      font-weight: 700;
      letter-spacing: 4px;
      margin-bottom: 10px;
    }

    /* ── Tabs ── */
    .tabs {
      display: flex;
    }
    .tab {
      flex: 1;
      padding: 10px;
      text-align: center;
      font-size: 14px;
      font-weight: 600;
      color: rgba(255,255,255,0.7);
      cursor: pointer;
      border-bottom: 3px solid transparent;
      transition: color 0.2s, border-color 0.2s;
    }
    .tab.active {
      color: #fff;
      border-bottom-color: #fff;
    }

    /* ── 탭 패널 ── */
    .panels {
      flex: 1;
      overflow: hidden;
      position: relative;
    }
    .panel {
      position: absolute;
      inset: 0;
      overflow-y: auto;
      padding: 16px;
      display: none;
      flex-direction: column;
      gap: 12px;
    }
    .panel.active { display: flex; }

    /* ── 카드 ── */
    .card {
      background: #fff;
      border-radius: 12px;
      padding: 14px;
      box-shadow: 0 1px 4px rgba(0,0,0,0.08);
    }

    .section-title {
      font-size: 13px;
      font-weight: 700;
      color: #444;
      margin-bottom: 8px;
    }

    /* ── 슬라이더 ── */
    .slider-row {
      display: flex;
      align-items: center;
      gap: 10px;
    }
    .slider-row label {
      font-size: 13px;
      font-weight: 700;
      white-space: nowrap;
    }
    .slider-row input[type=range] {
      flex: 1;
      accent-color: #0078d4;
      height: 4px;
    }
    .slider-val {
      font-size: 13px;
      font-weight: 700;
      color: #0078d4;
      min-width: 44px;
      text-align: right;
    }

    /* ── 텍스트에어리어 ── */
    textarea {
      width: 100%;
      border: 1.5px solid #ddd;
      border-radius: 8px;
      padding: 10px;
      font-size: 13px;
      font-family: inherit;
      resize: none;
      background: #fafafa;
      color: #111;
      outline: none;
      transition: border-color 0.2s;
    }
    textarea:focus { border-color: #0078d4; background: #fff; }
    textarea.mono { font-family: 'Courier New', monospace; }

    /* ── 버튼 ── */
    .btn-row {
      display: flex;
      gap: 8px;
    }
    .btn {
      flex: 1;
      padding: 12px 8px;
      border: none;
      border-radius: 10px;
      font-size: 14px;
      font-weight: 700;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 6px;
      transition: opacity 0.15s, transform 0.1s;
      -webkit-tap-highlight-color: transparent;
    }
    .btn:active { opacity: 0.75; transform: scale(0.97); }
    .btn-primary { background: #0078d4; color: #fff; }
    .btn-green   { background: #2e7d32; color: #fff; }
    .btn-outline {
      background: #fff;
      color: #0078d4;
      border: 2px solid #0078d4;
      flex: 1;
    }
    .btn-sm {
      padding: 7px 14px;
      font-size: 13px;
      border-radius: 8px;
      flex: none;
    }
    .btn-full { width: 100%; }

    /* ── 분할 결과 파트 버튼 ── */
    .part-btn {
      width: 100%;
      padding: 11px 14px;
      background: #fff;
      border: 1.5px solid #ccc;
      border-radius: 8px;
      font-size: 13px;
      text-align: left;
      cursor: pointer;
      color: #333;
      font-family: inherit;
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 8px;
      transition: background 0.15s, border-color 0.15s;
      -webkit-tap-highlight-color: transparent;
    }
    .part-btn:active { background: #e8f0fe; border-color: #0078d4; }
    .part-btn.copied { border-color: #2e7d32; background: #f1f8f1; }
    .part-label { font-weight: 700; color: #0078d4; white-space: nowrap; }
    .part-chars { font-size: 11px; color: #888; white-space: nowrap; }

    /* ── 상태 텍스트 ── */
    .status {
      font-size: 12px;
      color: #666;
      padding: 2px 0;
    }

    /* ── 토스트 ── */
    #toast {
      position: fixed;
      bottom: 24px;
      left: 50%;
      transform: translateX(-50%);
      background: #323232;
      color: #fff;
      padding: 10px 20px;
      border-radius: 24px;
      font-size: 14px;
      opacity: 0;
      pointer-events: none;
      transition: opacity 0.25s;
      white-space: nowrap;
      z-index: 999;
      max-width: calc(100vw - 32px);
      text-align: center;
    }
    #toast.show { opacity: 1; }
    #toast.success { background: #1b5e20; }
    #toast.error   { background: #b71c1c; }

    /* ── 하단 카피라이트 ── */
    .footer {
      text-align: center;
      font-size: 11px;
      color: #aaa;
      font-style: italic;
      padding: 6px 0 8px;
      flex-shrink: 0;
      background: #f2f4f8;
    }
  </style>
</head>
<body>

<div id="appbar">
  <h1>T x t F i t</h1>
  <div class="tabs">
    <div class="tab active" data-tab="split">문장 분할</div>
    <div class="tab" data-tab="clean">문자열 결합</div>
  </div>
</div>

<div class="panels">

  <!-- ── 문장 분할 ── -->
  <div class="panel active" id="panel-split">

    <div class="card">
      <div class="slider-row">
        <label>제한 글자 수</label>
        <input type="range" id="limitSlider" min="100" max="10000" step="100" value="3000" />
        <span class="slider-val" id="limitVal">3000</span>
      </div>
    </div>

    <div class="card">
      <div style="display:flex; align-items:center; justify-content:space-between; margin-bottom:8px;">
        <span class="section-title" style="margin:0;">1. 원문 입력</span>
        <button class="btn btn-primary btn-sm" id="splitPasteBtn">붙여넣기</button>
      </div>
      <textarea id="splitInput" rows="5" placeholder="여기에 긴 텍스트를 붙여넣으세요."></textarea>
    </div>

    <div class="btn-row">
      <button class="btn btn-primary" id="splitRunBtn">
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><line x1="21" y1="10" x2="7" y2="10"/><line x1="21" y1="6" x2="3" y2="6"/><line x1="21" y1="14" x2="3" y2="14"/><line x1="21" y1="18" x2="7" y2="18"/></svg>
        Split 실행
      </button>
      <button class="btn btn-outline" id="splitResetBtn">초기화</button>
    </div>

    <div class="status" id="splitStatus">상태: 대기 중</div>

    <div class="card">
      <div class="section-title">2. 분할 결과 (버튼 클릭 시 복사)</div>
      <div id="splitResults">
        <div style="font-size:13px; color:#aaa;">결과가 없습니다. Split 실행 후 버튼이 생성됩니다.</div>
      </div>
    </div>

    <div class="card">
      <div class="section-title">방금 복사된 내용 프리뷰</div>
      <textarea id="splitPreview" class="mono" rows="5" readonly placeholder="복사 버튼을 누르면 여기 표시됩니다."></textarea>
    </div>

  </div>

  <!-- ── 문자열 결합 ── -->
  <div class="panel" id="panel-clean">

    <div class="card">
      <div style="display:flex; align-items:center; justify-content:space-between; margin-bottom:8px;">
        <span class="section-title" style="margin:0;">1. 내용 블럭 입력</span>
        <button class="btn btn-primary btn-sm" id="cleanPasteBtn">블럭 붙여넣기</button>
      </div>
      <textarea id="cleanInput" rows="8" placeholder="블럭을 한 번씩 붙여넣으세요."></textarea>
    </div>

    <div class="btn-row">
      <button class="btn btn-green" id="cleanRunBtn">
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><polyline points="20 6 9 17 4 12"/></svg>
        정제 실행
      </button>
      <button class="btn btn-outline" id="cleanCopyBtn">결과 전체 복사</button>
    </div>

    <div class="card">
      <div class="section-title">2. 정제 결과</div>
      <textarea id="cleanOutput" class="mono" rows="10" readonly placeholder="정제 실행 후 결과가 여기 표시됩니다."></textarea>
    </div>

  </div>

</div>

<div class="footer">"글자 수 제한? txtfit으로 내 마음대로."</div>

<div id="toast"></div>

<script>
// ── 탭 전환 ──
document.querySelectorAll('.tab').forEach(tab => {
  tab.addEventListener('click', () => {
    document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
    document.querySelectorAll('.panel').forEach(p => p.classList.remove('active'));
    tab.classList.add('active');
    document.getElementById('panel-' + tab.dataset.tab).classList.add('active');
  });
});

// ── 슬라이더 ──
const limitSlider = document.getElementById('limitSlider');
const limitVal    = document.getElementById('limitVal');
limitSlider.addEventListener('input', () => {
  limitVal.textContent = limitSlider.value;
});

// ── 토스트 ──
let toastTimer;
function showToast(msg, type = '') {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.className = 'show' + (type ? ' ' + type : '');
  clearTimeout(toastTimer);
  toastTimer = setTimeout(() => t.classList.remove('show'), 2200);
}

// ── 클립보드 읽기 ──
async function readClipboard() {
  try {
    if (navigator.clipboard && navigator.clipboard.readText) {
      return await navigator.clipboard.readText();
    }
  } catch (e) {
    // 권한 거부 등
  }
  return null;
}

// ── 클립보드 쓰기 ──
async function writeClipboard(text) {
  try {
    if (navigator.clipboard && navigator.clipboard.writeText) {
      await navigator.clipboard.writeText(text);
      return true;
    }
  } catch (e) {}
  // fallback
  const ta = document.createElement('textarea');
  ta.value = text;
  ta.style.position = 'fixed';
  ta.style.opacity = '0';
  document.body.appendChild(ta);
  ta.focus();
  ta.select();
  const ok = document.execCommand('copy');
  document.body.removeChild(ta);
  return ok;
}

// ── Split 로직 ──
function doSplit(text, limit, n) {
  const parts = [];
  let i = 0, part = 1;
  while (i < text.length) {
    const header = `[${part}/${n}]\n`;
    const allowed = Math.max(1, limit - header.length);
    const end = Math.min(i + allowed, text.length);
    parts.push(text.substring(i, end));
    i = end;
    part++;
  }
  return parts;
}

function runSplit() {
  const text = document.getElementById('splitInput').value;
  const limit = parseInt(limitSlider.value);

  if (!text.trim()) {
    document.getElementById('splitStatus').textContent = '상태: 원문이 비어있습니다.';
    document.getElementById('splitResults').innerHTML =
      '<div style="font-size:13px;color:#aaa;">결과가 없습니다. Split 실행 후 버튼이 생성됩니다.</div>';
    return;
  }

  const roughChunk = Math.max(1, limit - 50);
  let n = Math.ceil(text.length / roughChunk);
  let parts = doSplit(text, limit, n);
  if (parts.length !== n) {
    n = parts.length;
    parts = doSplit(text, limit, n);
  }

  document.getElementById('splitStatus').textContent =
    `전체: ${text.length}자 | 제한: ${limit}자 | 조각: ${parts.length}개`;

  const container = document.getElementById('splitResults');
  container.innerHTML = '';

  parts.forEach((body, idx) => {
    const partNo = idx + 1;
    const header = `[${partNo}/${parts.length}]\n`;
    const fullText = header + body;

    const btn = document.createElement('button');
    btn.className = 'part-btn';
    btn.style.marginBottom = idx < parts.length - 1 ? '8px' : '0';
    btn.innerHTML = `
      <span class="part-label">Part ${partNo} 복사</span>
      <span class="part-chars">${fullText.length}자</span>
    `;
    btn.addEventListener('click', async () => {
      const ok = await writeClipboard(fullText);
      if (ok) {
        document.getElementById('splitPreview').value = fullText;
        document.querySelectorAll('.part-btn').forEach(b => b.classList.remove('copied'));
        btn.classList.add('copied');
        showToast(`Part ${partNo} 복사됨 ✓`, 'success');
      } else {
        showToast('복사 실패', 'error');
      }
    });
    container.appendChild(btn);
  });
}

// ── Clean 로직 ──
function runClean() {
  const rawText = document.getElementById('cleanInput').value;
  if (!rawText.trim()) return;

  const lines = rawText.split('\n');
  const cleaned = [];

  const metaPattern      = /^\[.*?\]\s\d{4}[./-]\d{2}[./-]\d{2}.*/;
  const partHeaderPattern = /^\[\d+\/\d+\]\s*$/;

  for (let i = 0; i < lines.length; i++) {
    const original = lines[i].replace(/\s+$/, '');
    const probe    = original.replace(/^\s+/, '');

    if (!probe) {
      cleaned.push('');
      continue;
    }

    if (metaPattern.test(probe)) continue;

    if (partHeaderPattern.test(probe)) {
      // findLastIndex 폴리필 (ES2023 미지원 구형 브라우저/WebView 대응)
      let prevIdx = -1;
      for (let j = cleaned.length - 1; j >= 0; j--) {
        if (cleaned[j].trim() !== '') { prevIdx = j; break; }
      }
      // 헤더 뒤 빈 줄 건너뛰고 실제 내용 줄 찾기
      let nextIdx = i + 1;
      let emptyCount = 0;
      while (nextIdx < lines.length && lines[nextIdx].trim() === '') {
        emptyCount++;
        nextIdx++;
      }
      const hasPrev = prevIdx !== -1;
      const hasNext = nextIdx < lines.length;
      if (hasPrev && hasNext) {
        const nextLine = lines[nextIdx].replace(/^\s+/, '');
        // 분할 지점에 원래 있던 빈 줄(단락 구분) 보존
        const separator = emptyCount > 0 ? '\n'.repeat(emptyCount + 1) : '';
        cleaned[prevIdx] = cleaned[prevIdx] + separator + nextLine;
        i = nextIdx;
      }
      continue;
    }

    cleaned.push(original);
  }

  document.getElementById('cleanOutput').value = cleaned.join('\n');
  showToast('정제 완료 ✓', 'success');
}

// ── 이벤트 바인딩 ──

// Split 탭
document.getElementById('splitPasteBtn').addEventListener('click', async () => {
  const text = await readClipboard();
  if (text !== null) {
    document.getElementById('splitInput').value = text;
    showToast('붙여넣기 완료');
  } else {
    showToast('텍스트 필드를 길게 눌러 붙여넣기 하세요', 'error');
  }
});

document.getElementById('splitRunBtn').addEventListener('click', runSplit);

document.getElementById('splitResetBtn').addEventListener('click', () => {
  document.getElementById('splitInput').value = '';
  document.getElementById('splitPreview').value = '';
  document.getElementById('splitResults').innerHTML =
    '<div style="font-size:13px;color:#aaa;">결과가 없습니다. Split 실행 후 버튼이 생성됩니다.</div>';
  document.getElementById('splitStatus').textContent = '상태: 초기화됨';
});

// Clean 탭
document.getElementById('cleanPasteBtn').addEventListener('click', async () => {
  const text = await readClipboard();
  if (text !== null && text.trim()) {
    const current = document.getElementById('cleanInput').value;
    document.getElementById('cleanInput').value =
      current.trimEnd() ? current.trimEnd() + '\n' + text : text;
    showToast('블럭 붙여넣기 완료');
  } else {
    showToast('텍스트 필드를 길게 눌러 붙여넣기 하세요', 'error');
  }
});

document.getElementById('cleanRunBtn').addEventListener('click', runClean);

document.getElementById('cleanCopyBtn').addEventListener('click', async () => {
  const text = document.getElementById('cleanOutput').value;
  if (!text) { showToast('결과가 없습니다', 'error'); return; }
  const ok = await writeClipboard(text);
  showToast(ok ? '전체 복사됨 ✓' : '복사 실패', ok ? 'success' : 'error');
});
</script>
</body>
</html>
